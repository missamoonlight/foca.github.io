<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flappy Foca — Modo Clásico (como Flappy Bird)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(145deg, #0b2b44, #031a2c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Press Start 2P', 'Arial', monospace;
            overflow: hidden;
            padding: 12px;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 460px;
            height: 80vh;
            max-height: 700px;
            min-height: 500px;
            border-radius: 28px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4), inset 0 0 0 2px rgba(255,255,200,0.2);
            overflow: hidden;
            background: #4eb0e0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* pantallas modales */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 15, 25, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 20;
            border-radius: 28px;
            padding: 20px;
            transition: 0.1s;
        }

        .hidden {
            display: none;
        }

        h1 {
            font-size: 2.6rem;
            color: #FFDF7E;
            text-shadow: 4px 4px 0 #1f5a6e;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
        }

        .sub {
            font-size: 1.1rem;
            background: #020f1ab3;
            padding: 8px 16px;
            border-radius: 40px;
            margin: 8px 0;
            color: #c6ecff;
        }

        .score-panel {
            font-size: 1.7rem;
            font-weight: bold;
            margin: 12px 0;
            background: #00000066;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 40px;
        }

        button {
            background: #f3b33d;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.5rem;
            padding: 12px 28px;
            border-radius: 60px;
            margin-top: 20px;
            color: #1e3b45;
            box-shadow: 0 6px 0 #a4511b;
            transition: 0.05s linear;
            cursor: pointer;
            touch-action: manipulation;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #a4511b;
        }

        #current-score {
            position: absolute;
            top: 18px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            text-shadow: 3px 3px 0 #00000080;
            z-index: 12;
            pointer-events: none;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .best-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #18262fcc;
            backdrop-filter: blur(6px);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #FFE0A3;
            z-index: 12;
            font-family: monospace;
        }

        .tap-instruction {
            position: absolute;
            bottom: 28px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 1rem;
            color: #ffffcc;
            font-weight: bold;
            text-shadow: 1px 1px 0 #001122;
            animation: fadePulse 1.5s infinite;
            pointer-events: none;
            z-index: 12;
        }

        @keyframes fadePulse {
            0% { opacity: 0.5; transform: translateY(0px);}
            50% { opacity: 1; transform: translateY(-5px);}
            100% { opacity: 0.5; transform: translateY(0px);}
        }

        /* responsive landscape */
        @media (max-height: 550px) and (orientation: landscape) {
            #game-container { height: 88vh; min-height: 320px; max-height: 380px; }
            h1 { font-size: 1.8rem; }
            .score-panel { font-size: 1.2rem; padding: 4px 16px; }
            button { font-size: 1.2rem; padding: 6px 18px; }
            .tap-instruction { bottom: 8px; font-size: 0.7rem;}
            #current-score { font-size: 1.8rem; top: 6px; }
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="current-score">0</div>
    <div class="best-badge">🏆 MEJOR: <span id="bestScoreSpan">0</span></div>
    <div class="tap-instruction">👇 TOCA CUALQUIER LUGAR 👇</div>

    <!-- pantalla de inicio -->
    <div id="startOverlay" class="overlay">
        <h1>🐟 FLAPPY FOCA</h1>
        <div class="sub">⚡ JUGABILIDAD CLÁSICA ⚡</div>
        <div class="score-panel" style="margin-top: 8px;">
            🎯 TOQUE RÁPIDO | 🪨 EVITA CORALES
        </div>
        <button id="startBtn">▶ JUGAR</button>
        <div style="margin-top: 20px; font-size: 0.8rem;">✨ Igual que Flappy Bird, pero con foca ✨</div>
    </div>

    <!-- pantalla game over -->
    <div id="gameOverlay" class="overlay hidden">
        <h2>💀 GAME OVER 💀</h2>
        <div class="score-panel">
            🎮 PUNTOS: <span id="finalScoreVal">0</span>
        </div>
        <div class="score-panel" style="background: #332211aa">
            🏅 RÉCORD: <span id="recordFinalSpan">0</span>
        </div>
        <button id="restartBtn">🔁 REINTENTAR</button>
        <div style="margin-top: 14px; font-size: 0.85rem;">🔹 Toca o presiona botón 🔹</div>
    </div>
</div>

<script>
    (function(){
        // ---------- ELEMENTOS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const currentScoreSpan = document.getElementById('current-score');
        const bestSpan = document.getElementById('bestScoreSpan');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverlay = document.getElementById('gameOverlay');
        const finalScoreSpan = document.getElementById('finalScoreVal');
        const recordFinalSpan = document.getElementById('recordFinalSpan');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // ---------- VARIABLES DE JUEGO ----------
        let gameActive = false;      // si el juego está corriendo
        let score = 0;
        let bestScore = 0;
        
        // cargar mejor puntuación
        try {
            const saved = localStorage.getItem('flappyFocaClassicBest');
            if (saved && !isNaN(parseInt(saved))) bestScore = parseInt(saved);
            bestSpan.textContent = bestScore;
        } catch(e) { /* silencio */ }

        // dimensiones dinámicas
        let cw = 400, ch = 600;
        
        // ----- OBJETO FOCA (pájaro) -----
        const seal = {
            x: 0,           // se define en resize
            y: 0,
            radius: 0,      // para colisiones circulares? usaremos rectángulo pero redondeado
            width: 0,
            height: 0,
            velY: 0,
            rotation: 0,
            // físicas estilo Flappy Bird (valores se recalcularán en resize según altura)
            GRAVITY: 0,        // px/s^2
            JUMP_FORCE: 0,     // px/s (negativo)
        };

        // ----- TUBOS (CORALES) -----
        let pipes = [];
        const PIPE_WIDTH_RATIO = 0.09;      // 9% del ancho del canvas
        const PIPE_GAP_RATIO = 0.28;        // hueco = 28% del alto (clásico ~ 28-30%)
        const PIPE_SPEED_RATIO = 0.32;      // velocidad: 32% del ancho por segundo (rápida como Flappy Bird)
        const PIPE_SPAWN_INTERVAL = 1.8;     // segundos entre cada par de tubos (clásico)
        
        let pipeTimer = 0;                  // acumulador delta para spawn
        let pipeSpeedPx = 0;                // px/s (calculado)
        let pipeWidth = 0;
        let pipeGap = 0;
        
        // límites del suelo y techo (colisiones)
        let groundY = 0;    // límite inferior Y (donde está el suelo decorativo)
        let ceilingY = 0;   // techo (0 + margen)
        
        // delta time
        let lastTimestamp = 0;
        let animFrame = null;
        
        // variables para efecto visual de frames (burbujas)
        let bgFrame = 0;
        
        // ---------- FUNCIONES DE REDIMENSIÓN Y PARÁMETROS ----------
        function resizeAndSetup() {
            const container = document.getElementById('game-container');
            const rect = container.getBoundingClientRect();
            cw = rect.width;
            ch = rect.height;
            canvas.width = cw;
            canvas.height = ch;
            
            // Tamaño de la foca (similar a Flappy Bird: ~ 9% del ancho, proporcionado)
            seal.width = cw * 0.085;
            seal.height = seal.width * 0.85;
            seal.radius = seal.width / 2;
            // Posición horizontal fija (un tercio del ancho, como en el original)
            seal.x = cw * 0.25;
            
            // Físicas ajustadas para sensación FLAPPY BIRD (rápida y precisa)
            // Gravedad: 1450 px/s^2 en un canvas de 600px da una caída rápida pero justa
            seal.GRAVITY = ch * 2.35;      // ~ 2.35 veces la altura por segundo cuadrado
            // Impulso de salto: subida instantánea de -470 px/s en altura 600px (efecto chasquido)
            seal.JUMP_FORCE = -ch * 0.82;   // valor contundente como Flappy Bird
            
            // Tubos (corales)
            pipeWidth = cw * PIPE_WIDTH_RATIO;
            pipeGap = ch * PIPE_GAP_RATIO;
            pipeSpeedPx = cw * PIPE_SPEED_RATIO;
            
            // límites: techo (borde superior, colisión a partir del centro) y suelo decorativo
            groundY = ch - (ch * 0.09);     // suelo ~ 9% del alto (colisión letal)
            ceilingY = 6;                   // tope superior con margen pequeño
            
            // si el juego no está activo, centramos visualmente a la foca
            if (!gameActive) {
                seal.y = ch / 2.2;
                seal.velY = 0;
                seal.rotation = 0;
            } else {
                // evitar que se salga de límites al cambiar tamaño durante juego
                if (seal.y - seal.height/2 < ceilingY) seal.y = ceilingY + seal.height/2;
                if (seal.y + seal.height/2 > groundY) seal.y = groundY - seal.height/2;
            }
        }
        
        // ---------- REINICIO COMPLETO DEL JUEGO ----------
        function fullReset() {
            score = 0;
            currentScoreSpan.textContent = "0";
            pipes = [];
            pipeTimer = 0;
            seal.velY = 0;
            seal.y = ch / 2.2;
            seal.rotation = 0;
            gameActive = true;
            // ocultar pantallas
            startOverlay.classList.add('hidden');
            gameOverlay.classList.add('hidden');
            
            // Asegurar parámetros actualizados
            resizeAndSetup();
            
            // generar primer tubo rápidamente (para que no empiece vacío)
            spawnPipe();
            // ajuste extra: timer para no generar tubos seguidos
            pipeTimer = 0.5; 
        }
        
        // Generar un nuevo par de tubos (posición aleatoria del hueco)
        function spawnPipe() {
            if (!cw || !ch) return;
            // márgenes de seguridad para que el hueco no toque bordes excesivamente
            const minTop = 40;
            const maxTop = ch - groundY - pipeGap - 35;
            let topY = Math.floor(Math.random() * (maxTop - minTop + 1) + minTop);
            topY = Math.min(Math.max(topY, 28), ch - pipeGap - 28);
            
            pipes.push({
                x: cw,
                topHeight: topY,
                bottomY: topY + pipeGap,
                width: pipeWidth,
                passed: false
            });
        }
        
        // Actualización física y colisiones (delta seconds)
        function updateGame(dt) {
            if (!gameActive) return;
            
            // 1. Física de la foca
            seal.velY += seal.GRAVITY * dt;
            seal.y += seal.velY * dt;
            
            // Rotación según velocidad (igual que flappy)
            if (seal.velY < 0) {
                seal.rotation = Math.max(-Math.PI / 5.2, seal.rotation - 0.09);
            } else {
                seal.rotation = Math.min(Math.PI / 3.8, seal.rotation + 0.07);
            }
            
            // Colisiones con techo y suelo (game over inmediato)
            if (seal.y - seal.height/2 <= ceilingY) {
                gameOver();
                return;
            }
            if (seal.y + seal.height/2 >= groundY) {
                gameOver();
                return;
            }
            
            // 2. Actualizar tubos (movimiento y colisiones)
            for (let i = 0; i < pipes.length; i++) {
                const p = pipes[i];
                p.x -= pipeSpeedPx * dt;
                
                // COLISIÓN (caja de la foca vs tubos) - exacta como Flappy Bird
                const sealLeft = seal.x - seal.width/2;
                const sealRight = seal.x + seal.width/2;
                const sealTop = seal.y - seal.height/2;
                const sealBottom = seal.y + seal.height/2;
                
                const pipeLeft = p.x;
                const pipeRight = p.x + p.width;
                
                if (sealRight > pipeLeft && sealLeft < pipeRight) {
                    // choca con el tubo superior o inferior
                    if (sealTop < p.topHeight || sealBottom > p.bottomY) {
                        gameOver();
                        return;
                    }
                }
                
                // Puntuación (cuando la foca pasa el tubo)
                if (!p.passed && p.x + p.width < seal.x) {
                    p.passed = true;
                    score++;
                    currentScoreSpan.textContent = score;
                    // efecto háptico sutil en móvil
                    if (navigator.vibrate) navigator.vibrate(18);
                }
            }
            
            // eliminar tubos fuera de pantalla
            pipes = pipes.filter(p => p.x + p.width > 0);
            
            // 3. Generación periódica de nuevos tubos (como Flappy Bird)
            pipeTimer += dt;
            if (pipeTimer >= PIPE_SPAWN_INTERVAL) {
                pipeTimer = 0;
                spawnPipe();
                // a veces pequeña variación en el intervalo para evitar monotonía
                if (Math.random() < 0.15) pipeTimer = -0.1;
            }
        }
        
        // ---------- GAME OVER ----------
        function gameOver() {
            if (!gameActive) return;
            gameActive = false;
            
            // actualizar mejor puntuación
            if (score > bestScore) {
                bestScore = score;
                try {
                    localStorage.setItem('flappyFocaClassicBest', bestScore);
                } catch(e) {}
                bestSpan.textContent = bestScore;
            }
            finalScoreSpan.textContent = score;
            recordFinalSpan.textContent = bestScore;
            gameOverlay.classList.remove('hidden');
            if (navigator.vibrate) navigator.vibrate(70);
        }
        
        // ---------- ACCIÓN DE VOLAR (TOQUE) ----------
        function jump() {
            if (!gameActive) return;
            // Solo puede saltar si está vivo, aplicación instantánea de velocidad
            seal.velY = seal.JUMP_FORCE;
            // efecto de rotación inmediata hacia arriba
            seal.rotation = -Math.PI / 7;
            // pequeñas burbujas visuales por feedback
            if (navigator.vibrate) navigator.vibrate(9);
        }
        
        // ---------- DIBUJADO COMPLETO (estilo colorido) ----------
        function drawBackground() {
            // gradiente de agua
            const grad = ctx.createLinearGradient(0, 0, 0, ch);
            grad.addColorStop(0, '#4ea9e0');
            grad.addColorStop(0.7, '#1970a0');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, cw, ch);
            
            // burbujas flotantes
            ctx.fillStyle = 'rgba(255,250,210,0.65)';
            for (let i = 0; i < 10; i++) {
                const x = (i * 47 + bgFrame * 0.7) % (cw + 80) - 40;
                const y = 45 + Math.sin(bgFrame * 0.02 + i) * 28;
                const rad = 2 + Math.sin(bgFrame * 0.05 + i) * 1.8;
                ctx.beginPath();
                ctx.arc(x, y, rad, 0, Math.PI*2);
                ctx.fill();
            }
            // algas decorativas (ondulantes)
            ctx.fillStyle = '#4e9a6b';
            for (let i = 0; i < 5; i++) {
                const baseX = 18 + i * (cw / 5);
                const sway = Math.sin(bgFrame * 0.03 + i) * 5;
                ctx.beginPath();
                ctx.moveTo(baseX, ch - (ch*0.09));
                ctx.quadraticCurveTo(baseX - 7 + sway, ch - (ch*0.09) - 28, baseX + sway*0.5, ch - (ch*0.09) - 48);
                ctx.quadraticCurveTo(baseX + 9 + sway, ch - (ch*0.09) - 24, baseX, ch - (ch*0.09));
                ctx.fill();
            }
            // Suelo (arena/roca)
            ctx.fillStyle = '#ddb775';
            ctx.fillRect(0, groundY, cw, ch - groundY);
            ctx.fillStyle = '#b5874a';
            for (let i=0; i<12; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*cw, groundY + Math.random()*(ch-groundY), 2+Math.random()*3, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        function drawPipes() {
            for (let p of pipes) {
                // Tubo superior (coral rojizo)
                ctx.fillStyle = '#e66948';
                ctx.fillRect(p.x, 0, p.width, p.topHeight);
                ctx.fillStyle = '#c54528';
                // detalles picos
                for (let i=0; i<4; i++) {
                    const spikeX = p.x + i * (p.width/4);
                    ctx.beginPath();
                    ctx.moveTo(spikeX, p.topHeight);
                    ctx.lineTo(spikeX+6, p.topHeight-14);
                    ctx.lineTo(spikeX-6, p.topHeight-14);
                    ctx.fill();
                }
                // Tubo inferior (coral verdoso)
                ctx.fillStyle = '#4fa86e';
                ctx.fillRect(p.x, p.bottomY, p.width, ch - p.bottomY - (ch - groundY));
                ctx.fillStyle = '#328a52';
                for (let i=0; i<4; i++) {
                    const spikeX = p.x + i * (p.width/4);
                    ctx.beginPath();
                    ctx.moveTo(spikeX, p.bottomY);
                    ctx.lineTo(spikeX+6, p.bottomY+15);
                    ctx.lineTo(spikeX-6, p.bottomY+15);
                    ctx.fill();
                }
            }
        }
        
        function drawSeal() {
            ctx.save();
            ctx.translate(seal.x, seal.y);
            ctx.rotate(seal.rotation);
            // cuerpo principal
            ctx.fillStyle = '#f5cf9b';
            ctx.beginPath();
            ctx.ellipse(0, 0, seal.width/2, seal.height/2, 0, 0, Math.PI*2);
            ctx.fill();
            // cabeza redondeada
            ctx.fillStyle = '#f0c68a';
            ctx.beginPath();
            ctx.arc(seal.width/2.3, -3, seal.height/2.5, 0, Math.PI*2);
            ctx.fill();
            // ojo
            ctx.fillStyle = '#1f2e2a';
            ctx.beginPath();
            ctx.arc(seal.width/2.1, -7, 3.2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(seal.width/2.1 - 1.2, -8.2, 1.2, 0, Math.PI*2);
            ctx.fill();
            // bigotes (vibrisas)
            ctx.strokeStyle = '#3a2a1e';
            ctx.lineWidth = 1.2;
            for (let w=-1; w<=1; w++) {
                ctx.beginPath();
                ctx.moveTo(seal.width/1.9, -4);
                ctx.lineTo(seal.width/1.9 + 9, -4 + w*2.5);
                ctx.stroke();
            }
            // aletas laterales
            ctx.fillStyle = '#e2b47a';
            ctx.beginPath();
            ctx.ellipse(-8, 5, 6, 3.5, -0.3, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(-8, -6, 6, 3.5, 0.3, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        
        function drawGroundGrass() {
            ctx.fillStyle = '#84613a';
            for (let i=0; i<12; i++) {
                ctx.beginPath();
                ctx.rect(Math.random()*cw, groundY-3, 2, 5);
                ctx.fill();
            }
        }
        
        function render() {
            drawBackground();
            drawPipes();
            drawGroundGrass();
            drawSeal();
            // partículas extra (chispitas de agua)
            if (gameActive && seal.velY < -50) {
                ctx.fillStyle = '#aff0ffaa';
                for (let s=0; s<3; s++) {
                    ctx.beginPath();
                    ctx.arc(seal.x - seal.width/2 + (Math.random()*10-5), seal.y + (Math.random()*12-6), 1.5, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }
        
        // ---------- GAME LOOP con delta time ----------
        let previousTime = 0;
        function gameLoop(nowMs) {
            if (!previousTime) {
                previousTime = nowMs;
                requestAnimationFrame(gameLoop);
                render();
                bgFrame++;
                return;
            }
            let delta = Math.min(0.033, (nowMs - previousTime) / 1000);
            if (delta <= 0.001) {
                previousTime = nowMs;
                requestAnimationFrame(gameLoop);
                render();
                bgFrame++;
                return;
            }
            previousTime = nowMs;
            
            if (gameActive) {
                updateGame(delta);
            }
            
            render();
            bgFrame++;
            requestAnimationFrame(gameLoop);
        }
        
        // ---------- EVENTOS TÁCTILES Y RATÓN (SALTO) ----------
        function handleJumpTouch(e) {
            e.preventDefault();
            // Si el juego está activo -> saltar
            if (gameActive) {
                jump();
            } 
            // Si el juego NO está activo pero estamos en pantalla game over o inicio, interpretar como reinicio rápido
            else if (!gameActive) {
                // si la pantalla de game over está visible -> reiniciar
                if (!gameOverlay.classList.contains('hidden')) {
                    fullReset();
                }
                // si la pantalla de inicio está visible -> también arrancar
                else if (!startOverlay.classList.contains('hidden')) {
                    fullReset();
                }
            }
        }
        
        // eventos táctiles y mouse
        function attachEvents() {
            const gameContainer = document.getElementById('game-container');
            canvas.addEventListener('touchstart', handleJumpTouch, { passive: false });
            canvas.addEventListener('mousedown', handleJumpTouch);
            // también evitar eventos de contexto en móvil
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        }
        
        // Botones manuales
        startBtn.addEventListener('click', () => { fullReset(); });
        restartBtn.addEventListener('click', () => { fullReset(); });
        
        // Redimensionamiento responsivo
        window.addEventListener('resize', () => {
            resizeAndSetup();
            if (!gameActive) {
                // reposicionar foca
                seal.y = ch / 2.2;
                seal.velY = 0;
            }
        });
        
        // Inicialización total
        function init() {
            resizeAndSetup();
            attachEvents();
            // Asegurar estado inicial en pantalla de inicio
            gameActive = false;
            startOverlay.classList.remove('hidden');
            gameOverlay.classList.add('hidden');
            seal.y = ch / 2.2;
            seal.velY = 0;
            pipes = [];
            score = 0;
            currentScoreSpan.textContent = "0";
            requestAnimationFrame(gameLoop);
        }
        
        init();
    })();
</script>
</body>
</html>
