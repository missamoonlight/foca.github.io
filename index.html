<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flappy Foca - Modo Fácil Móvil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(145deg, #0b3b6b, #011126);
            overflow: hidden;
            padding: 12px;
            margin: 0;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 460px;
            height: 75vh;
            min-height: 520px;
            max-height: 750px;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 4px rgba(255,255,255,0.2);
            overflow: hidden;
            background: #0a5f9e;
            transition: all 0.2s ease;
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* Pantallas modales */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(8, 28, 51, 0.92);
            backdrop-filter: blur(8px);
            color: white;
            text-align: center;
            padding: 1.5rem;
            z-index: 30;
            border-radius: 32px;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 1rem;
            color: #FFE484;
            text-shadow: 3px 3px 0 #1a4d6b;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 1rem;
            color: #FFD966;
            text-shadow: 2px 2px 0 #1f4e6e;
        }

        .instructions {
            background: rgba(255,255,240,0.15);
            padding: 1rem 1.2rem;
            border-radius: 32px;
            margin: 1.2rem 0;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .instructions p {
            font-size: 1.15rem;
            margin: 0.6rem 0;
        }

        button {
            background: #f5b042;
            color: #1e2f3a;
            border: none;
            padding: 14px 32px;
            font-size: 1.35rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 5px 0 #b4621a;
            transition: transform 0.07s, box-shadow 0.1s;
            margin-top: 20px;
            min-width: 200px;
            font-family: inherit;
            touch-action: manipulation;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b4621a;
        }

        #score-display {
            position: absolute;
            top: 18px;
            left: 20px;
            font-size: 2.4rem;
            font-weight: 800;
            color: white;
            text-shadow: 3px 3px 0 #0a2f44;
            z-index: 15;
            font-family: monospace;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.35);
            padding: 5px 14px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }

        .easy-badge {
            position: absolute;
            top: 18px;
            right: 18px;
            background: #48b56e;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            z-index: 15;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .tap-hint {
            position: absolute;
            bottom: 28px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 210, 0.9);
            font-size: 1rem;
            font-weight: bold;
            text-shadow: 1px 1px 0 #001f33;
            animation: softPulse 1.8s infinite;
            pointer-events: none;
            z-index: 12;
        }

        @keyframes softPulse {
            0% { opacity: 0.6; transform: translateY(0px);}
            50% { opacity: 1; transform: translateY(-4px);}
            100% { opacity: 0.6; transform: translateY(0px);}
        }

        .hidden {
            display: none;
        }

        /* Orientación landscape en móviles pequeños */
        @media (max-height: 550px) and (orientation: landscape) {
            #game-container {
                height: 88vh;
                min-height: 280px;
                max-height: 340px;
            }
            h1 { font-size: 1.9rem; }
            .instructions p { font-size: 0.85rem; margin: 0.2rem 0; }
            button { padding: 8px 20px; font-size: 1.1rem; min-width: 150px; }
            .easy-badge { top: 8px; right: 8px; font-size: 0.7rem; padding: 3px 10px;}
            #score-display { font-size: 1.8rem; top: 8px; left: 12px;}
        }

        @media (max-width: 420px) {
            h1 { font-size: 2.3rem; }
            .instructions p { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="score-display">0</div>
    <div class="easy-badge">🐋 MODO BALLENATO</div>
    <div id="tap-area"></div>

    <div id="start-screen" class="screen">
        <h1>🌊 FLAPPY FOCA</h1>
        <div class="instructions">
            <p>🐟 Toca en CUALQUIER LUGAR para nadar</p>
            <p>🧜‍♀️ Esquiva los corales malvados</p>
            <p style="color: #b3ffcf; font-weight: bold;">✨ ¡Súper fácil + MUY LENTO! ✨</p>
        </div>
        <button id="start-button">🎮 JUGAR AHORA</button>
        <div class="tap-hint" style="position: relative; bottom: -20px;">👇 Toca y flota suavemente 👇</div>
    </div>

    <div id="game-over-screen" class="screen hidden">
        <h2>💀 GAME OVER 💀</h2>
        <p style="font-size: 1.6rem;">Puntos: <span id="final-score">0</span></p>
        <p style="font-size: 1.2rem; margin-bottom: 5px;">🐚 Mejor: <span id="best-score">0</span></p>
        <button id="restart-button">🔄 NADAR DE NUEVO</button>
    </div>
</div>

<script>
    (function() {
        // ---------- ELEMENTOS DOM ----------
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('score-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreSpan = document.getElementById('final-score');
        const bestScoreSpan = document.getElementById('best-score');
        const startBtn = document.getElementById('start-button');
        const restartBtn = document.getElementById('restart-button');
        
        // ---------- VARIABLES DE JUEGO ----------
        let gameRunning = false;
        let score = 0;
        let bestScoreValue = 0;
        
        // Cargar mejor puntuación
        try {
            const saved = localStorage.getItem('flappyFocaBestScore');
            if (saved !== null && !isNaN(parseInt(saved))) bestScoreValue = parseInt(saved);
            bestScoreSpan.textContent = bestScoreValue;
        } catch(e) { /* silencio */ }
        
        // ---------- PARÁMETROS FÍSICA (delta-time, configuración extra fácil) ----------
        let canvasW = 400, canvasH = 600;   // valores por defecto
        let seal = {
            x: 0, y: 0, width: 0, height: 0,
            velocity: 0,
            rotation: 0,
            color: '#FAD6B3'
        };
        
        // Variables dinámicas que se recalcularán en resize
        let gravityPerSecond = 0;        // px/s^2
        let jumpImpulse = 0;             // px/s (velocidad instantánea al tocar)
        let obstacleSpeedPerSecond = 0;  // px/s
        let obstacleGapRatio = 0.52;     // hueco = alto * 0.52 (muy amplio)
        let obstacleWidthRatio = 0.075;  // ancho relativo al canvas
        let generateInterval = 2.65;     // segundos entre obstáculos (bastante lento)
        
        // Obstáculos
        let obstacles = [];
        let generationTimer = 0;
        
        // Suelo (solo visual y colisión inferior)
        let groundHeight = 0;
        
        // Variables delta time
        let lastTimestamp = null;
        let animationId = null;
        let framesForBg = 0;   // para burbujas y plantas (solo estética)
        
        // márgenes de colisión (más amigables)
        let collisionPadding = 0; // se definirá en resize
        
        // ---------- FUNCIONES DE INICIALIZACIÓN Y REDIMENSIÓN ----------
        function updateDynamicParams() {
            if (!canvasW || !canvasH) return;
            
            // Tamaño de la foca (proporciones amigables)
            seal.width = canvasW * 0.095;
            seal.height = seal.width * 0.8;
            seal.x = canvasW * 0.18;   // posición fija horizontal
            
            // Física EXTRA FÁCIL: gravedad muy baja, salto efectivo pero suave
            gravityPerSecond = canvasH * 0.021;      // 2.1% de altura por segundo (muy leve)
            jumpImpulse = -canvasH * 0.032;          // salto notable pero controlable
            
            // Velocidad de obstáculos MUY LENTA (más fácil en móvil)
            obstacleSpeedPerSecond = canvasW * 0.065;  // 6.5% del ancho/segundo
            
            // Suelo decorativo (colisión en parte baja)
            groundHeight = canvasH * 0.12;
            
            // Margen de colisión extra: más tolerante
            collisionPadding = Math.max(6, seal.width * 0.18);
            
            // Reiniciar posición vertical si juego no activo (evita bugs)
            if (!gameRunning) {
                seal.y = canvasH / 2.2;
                seal.velocity = 0;
                seal.rotation = 0;
            }
        }
        
        function resizeCanvasAndSettings() {
            const container = document.getElementById('game-container');
            if (!container) return;
            const rect = container.getBoundingClientRect();
            canvasW = rect.width;
            canvasH = rect.height;
            canvas.width = canvasW;
            canvas.height = canvasH;
            
            updateDynamicParams();
            
            // Si el juego está corriendo, ajustamos obstáculos (posición relativa no importa mucho, evitar bugs)
            if (gameRunning) {
                // reajustamos posiciones verticales de corales si existen (evitamos colisiones fuera de rango)
                for (let obs of obstacles) {
                    if (obs.yPos && canvasH) {
                        // asegurar que el gap y posición sigan dentro límites lógicos
                        const maxSafeY = Math.max(40, canvasH - groundHeight - (canvasH * obstacleGapRatio) - 40);
                        const minSafeY = 40;
                        if (obs.yPos > maxSafeY) obs.yPos = maxSafeY;
                        if (obs.yPos < minSafeY) obs.yPos = minSafeY;
                    }
                }
                // mantener la foca dentro de márgenes
                if (seal.y - seal.height/2 < 0) seal.y = seal.height/2;
                if (seal.y + seal.height/2 > canvasH - groundHeight) seal.y = canvasH - groundHeight - seal.height/2;
            }
        }
        
        // ---------- LÓGICA DEL JUEGO (delta time) ----------
        function resetGameState() {
            score = 0;
            scoreSpan.textContent = "0";
            obstacles = [];
            generationTimer = 0;
            seal.velocity = 0;
            seal.y = canvasH / 2.2;
            seal.rotation = 0;
            if (canvasH > 0) {
                seal.y = Math.min(Math.max(seal.y, seal.height/2 + 5), canvasH - groundHeight - seal.height/2 - 5);
            }
            gameRunning = true;
        }
        
        function spawnObstacle() {
            if (!canvasH || !groundHeight) return;
            const gapHeight = canvasH * obstacleGapRatio;
            // Rango seguro para el borde superior del coral (entre 40 y el tope del hueco)
            let minTop = 45;
            let maxTop = canvasH - groundHeight - gapHeight - 45;
            if (maxTop <= minTop) maxTop = minTop + 20;
            const randomTop = Math.floor(Math.random() * (maxTop - minTop + 1) + minTop);
            obstacles.push({
                x: canvasW,
                yPos: randomTop,
                width: canvasW * obstacleWidthRatio,
                passed: false
            });
        }
        
        function updateGame(deltaSec) {
            if (!gameRunning) return;
            
            // 1. Actualizar foca con gravedad
            seal.velocity += gravityPerSecond * deltaSec;
            seal.y += seal.velocity * deltaSec;
            
            // Rotación fluida estilo flappy
            if (seal.velocity < 0) {
                seal.rotation = Math.max(-Math.PI / 5.5, seal.rotation - 0.09);
            } else {
                seal.rotation = Math.min(Math.PI / 4.2, seal.rotation + 0.05);
            }
            
            // Límites verticales (techo y suelo)
            const ceilingLimit = seal.height/2 + 2;
            if (seal.y - seal.height/2 <= 0) {
                seal.y = seal.height/2;
                seal.velocity = 0;
                // colisión techo -> game over (evita bug flotando fuera)
                if (seal.y - seal.height/2 <= 0) gameOver();
            }
            const floorLimit = canvasH - groundHeight - seal.height/2;
            if (seal.y + seal.height/2 >= canvasH - groundHeight) {
                seal.y = floorLimit;
                if (seal.velocity > 0) seal.velocity = 0;
                gameOver();
                return;
            }
            
            // 2. Actualizar obstáculos y colisiones
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                obs.x -= obstacleSpeedPerSecond * deltaSec;
                
                // Detección de colisión (con margen extra amigable)
                const sealLeft = seal.x - seal.width/2 + 4;
                const sealRight = seal.x + seal.width/2 - 4;
                const sealTop = seal.y - seal.height/2 + 3;
                const sealBottom = seal.y + seal.height/2 - 3;
                
                const obsLeft = obs.x;
                const obsRight = obs.x + obs.width;
                const topObsBottom = obs.yPos;
                const bottomObsTop = obs.yPos + (canvasH * obstacleGapRatio);
                
                if (sealRight > obsLeft && sealLeft < obsRight) {
                    if (sealTop < topObsBottom || sealBottom > bottomObsTop) {
                        gameOver();
                        return;
                    }
                }
                
                // Puntuación (cuando pasa el obstáculo)
                if (!obs.passed && obs.x + obs.width < seal.x) {
                    obs.passed = true;
                    score++;
                    scoreSpan.textContent = score;
                    // efecto sutil de vibración si soporta (mejora feedback)
                    if (navigator.vibrate) navigator.vibrate(20);
                }
            }
            
            // Eliminar obstáculos fuera de pantalla
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
            
            // 3. Generación de nuevos obstáculos con temporizador delta
            if (gameRunning) {
                generationTimer += deltaSec;
                if (generationTimer >= generateInterval) {
                    generationTimer = 0;
                    spawnObstacle();
                    // Espaciado variable: a veces doble intervalo más largo (para más calma)
                    if (Math.random() < 0.2) generationTimer = -0.3; // retraso extra ocasional
                }
            }
        }
        
        // ---------- GAME OVER ----------
        function gameOver() {
            if (!gameRunning) return;
            gameRunning = false;
            
            if (score > bestScoreValue) {
                bestScoreValue = score;
                try {
                    localStorage.setItem('flappyFocaBestScore', bestScoreValue);
                } catch(e) {}
                bestScoreSpan.textContent = bestScoreValue;
            }
            finalScoreSpan.textContent = score;
            gameOverScreen.classList.remove('hidden');
            // Efecto háptico al morir (sutil)
            if (navigator.vibrate) navigator.vibrate(80);
        }
        
        // ---------- ACCIÓN DE NADAR (TOQUE) ----------
        function swimAction(e) {
            if (!gameRunning) return;
            // Aplicar impulso vertical (jump)
            seal.velocity = jumpImpulse;
            // Rotación hacia arriba instantánea
            seal.rotation = -Math.PI / 7;
            
            // Efecto visual de burbujas al nadar
            if (canvasW > 0) {
                for (let i = 0; i < 4; i++) {
                    setTimeout(() => {
                        if (!gameRunning) return;
                        ctx.fillStyle = 'rgba(210, 245, 255, 0.8)';
                        ctx.beginPath();
                        ctx.arc(seal.x - seal.width/2 - 4, seal.y + (Math.random() * 12 - 6), 2 + Math.random() * 3, 0, Math.PI*2);
                        ctx.fill();
                    }, i * 35);
                }
            }
            // Respuesta háptica ligera al aleteo
            if (navigator.vibrate) navigator.vibrate(12);
            e?.preventDefault?.();
        }
        
        // ---------- DIBUJADO COMPLETO ----------
        function drawBackground() {
            // agua profunda gradiente
            const grad = ctx.createLinearGradient(0, 0, 0, canvasH);
            grad.addColorStop(0, '#4aa3df');
            grad.addColorStop(0.7, '#1b6d9e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvasW, canvasH);
            
            // burbujas animadas con frames (solo estética)
            ctx.fillStyle = 'rgba(255,255,245,0.6)';
            for (let i = 0; i < 9; i++) {
                const x = (i * 57 + framesForBg * 0.9) % (canvasW + 80) - 40;
                const y = 45 + Math.sin(framesForBg * 0.023 + i) * 22;
                const rad = 2.5 + Math.sin(framesForBg * 0.07 + i) * 1.2;
                ctx.beginPath();
                ctx.arc(x, y, rad, 0, Math.PI*2);
                ctx.fill();
            }
            
            // plantas ondulantes
            ctx.fillStyle = '#3d9e6d';
            for (let i = 0; i < 6; i++) {
                const baseX = 15 + i * (canvasW / 6);
                const sway = Math.sin(framesForBg * 0.025 + i) * 6;
                ctx.beginPath();
                ctx.moveTo(baseX, canvasH - groundHeight);
                ctx.quadraticCurveTo(baseX - 8 + sway, canvasH - groundHeight - 28, baseX + sway*0.5, canvasH - groundHeight - 42);
                ctx.quadraticCurveTo(baseX + 8 + sway, canvasH - groundHeight - 28, baseX, canvasH - groundHeight);
                ctx.fill();
            }
            // Arena del fondo
            ctx.fillStyle = '#e0bc7c';
            ctx.fillRect(0, canvasH - groundHeight, canvasW, groundHeight);
            ctx.fillStyle = '#cb9e5e';
            for (let i=0;i<canvasW/12;i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*canvasW, canvasH - groundHeight + Math.random()*groundHeight, 1.5, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        function drawSeal() {
            ctx.save();
            ctx.translate(seal.x, seal.y);
            ctx.rotate(seal.rotation);
            // cuerpo
            ctx.fillStyle = '#f7cfad';
            ctx.beginPath();
            ctx.ellipse(0, 0, seal.width/2, seal.height/2, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#e7b98a';
            ctx.beginPath();
            ctx.ellipse(seal.width*0.3, -seal.height*0.1, seal.width*0.25, seal.height*0.22, 0, 0, Math.PI*2);
            ctx.fill();
            // cabeza
            ctx.fillStyle = '#f7cfad';
            ctx.beginPath();
            ctx.arc(seal.width/2.4, -3, seal.height/2.6, 0, Math.PI*2);
            ctx.fill();
            // ojo
            ctx.fillStyle = '#1f2f2c';
            ctx.beginPath();
            ctx.arc(seal.width/2.1, -7, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(seal.width/2.1 - 1, -8, 1, 0, Math.PI*2);
            ctx.fill();
            // bigotes
            ctx.strokeStyle = '#34221a';
            ctx.lineWidth = 1.2;
            for (let s = -1; s <= 1; s++) {
                ctx.beginPath();
                ctx.moveTo(seal.width/1.9, -4);
                ctx.lineTo(seal.width/1.9 + 8, -4 + s*3);
                ctx.stroke();
            }
            // aletas
            ctx.fillStyle = '#e4b184';
            ctx.beginPath();
            ctx.ellipse(-7, 5, 6, 3.5, -0.4, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(-7, -6, 6, 3.5, 0.4, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        
        function drawObstacles() {
            const gapHeight = canvasH * obstacleGapRatio;
            for (let obs of obstacles) {
                // Coral superior (rojo anaranjado)
                ctx.fillStyle = '#e66a4b';
                ctx.beginPath();
                ctx.rect(obs.x, 0, obs.width, obs.yPos);
                ctx.fill();
                ctx.fillStyle = '#c94f32';
                for (let i=0; i<5; i++) {
                    const spikeX = obs.x + i * (obs.width/5);
                    ctx.beginPath();
                    ctx.moveTo(spikeX, obs.yPos);
                    ctx.lineTo(spikeX+5, obs.yPos-12);
                    ctx.lineTo(spikeX-5, obs.yPos-12);
                    ctx.fill();
                }
                // Coral inferior (verde mar)
                const bottomY = obs.yPos + gapHeight;
                ctx.fillStyle = '#48b57a';
                ctx.fillRect(obs.x, bottomY, obs.width, canvasH - groundHeight - bottomY);
                ctx.fillStyle = '#2f8b5a';
                for (let i=0; i<5; i++) {
                    const spikeX = obs.x + i * (obs.width/5);
                    ctx.beginPath();
                    ctx.moveTo(spikeX, bottomY);
                    ctx.lineTo(spikeX+6, bottomY+13);
                    ctx.lineTo(spikeX-6, bottomY+13);
                    ctx.fill();
                }
            }
        }
        
        function drawGroundDetails() {
            ctx.fillStyle = '#ca9a5e';
            ctx.shadowBlur = 0;
            for (let i=0;i<12;i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*canvasW, canvasH - groundHeight + 4 + Math.random()*12, 1+Math.random()*2, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        function render() {
            drawBackground();
            drawObstacles();
            drawGroundDetails();
            drawSeal();
        }
        
        // ---------- GAME LOOP CON DELTA TIME ----------
        let lastFrameTime = 0;
        function gameLoop(nowMs) {
            if (!lastFrameTime) {
                lastFrameTime = nowMs;
                requestAnimationFrame(gameLoop);
                render();
                framesForBg++;
                return;
            }
            let delta = Math.min(0.033, (nowMs - lastFrameTime) / 1000);
            if (delta <= 0) {
                lastFrameTime = nowMs;
                requestAnimationFrame(gameLoop);
                render();
                framesForBg++;
                return;
            }
            lastFrameTime = nowMs;
            
            if (gameRunning) {
                updateGame(delta);
            }
            render();
            framesForBg++;
            requestAnimationFrame(gameLoop);
        }
        
        // ---------- INICIAR NUEVA PARTIDA ----------
        function startNewGame() {
            if (!canvasW || !canvasH) resizeCanvasAndSettings();
            resetGameState();
            gameRunning = true;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            generationTimer = 0;
            obstacles = [];
            seal.y = canvasH / 2.2;
            seal.velocity = 0;
            seal.rotation = 0;
            // Ajustar límites
            if (canvasH) {
                seal.y = Math.min(Math.max(seal.y, seal.height/2 + 3), canvasH - groundHeight - seal.height/2 - 3);
            }
            // forzar que no se generen obstáculos instantáneos
            generationTimer = 0.7;
            if (navigator.vibrate) navigator.vibrate(15);
        }
        
        // ---------- EVENTOS TÁCTILES Y RATÓN ----------
        function attachGlobalTouch() {
            const container = document.getElementById('game-container');
            // Tocar en todo el canvas mientras el juego está activo
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameRunning) swimAction(e);
            }, { passive: false });
            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                if (gameRunning) swimAction(e);
            });
            // También área tap flotante para mayor comodidad
            const tapDiv = document.getElementById('tap-area');
            if (tapDiv) {
                tapDiv.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (gameRunning) swimAction(e);
                }, { passive: false });
                tapDiv.addEventListener('mousedown', (e) => {
                    if (gameRunning) swimAction(e);
                });
            }
        }
        
        // ---------- EVENTOS DE PANTALLA Y BOTONES ----------
        window.addEventListener('resize', () => {
            resizeCanvasAndSettings();
            if (!gameRunning) {
                // centrar visualmente a la foca en reposo
                if (canvasH) seal.y = canvasH / 2.2;
            }
        });
        
        startBtn.addEventListener('click', () => {
            resizeCanvasAndSettings();
            startNewGame();
        });
        restartBtn.addEventListener('click', () => {
            resizeCanvasAndSettings();
            startNewGame();
        });
        
        // Soporte teclado espacio (útil en pruebas)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === 'ArrowUp') {
                e.preventDefault();
                if (!gameRunning && startScreen.classList.contains('hidden') === false) startNewGame();
                else if (gameRunning) swimAction();
                else if (gameOverScreen.classList.contains('hidden') === false) startNewGame();
            }
        });
        
        // Inicialización total
        function init() {
            resizeCanvasAndSettings();
            attachGlobalTouch();
            // Asegurar valores iniciales de foca
            if (canvasH) seal.y = canvasH / 2.2;
            // bucle arrancado
            gameRunning = false;
            lastFrameTime = null;
            requestAnimationFrame(gameLoop);
        }
        
        init();
    })();
</script>
</body>
</html>
