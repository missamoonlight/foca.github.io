<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Foca Tetris · Apila focas marinas</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a2f44, #031a2a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 16px;
        }

        .game-wrapper {
            background: #05212e;
            border-radius: 48px;
            padding: 18px 12px 18px 12px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,200,0.2);
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 18px;
            backdrop-filter: blur(2px);
        }

        /* tablero principal */
        .board-section {
            position: relative;
        }

        canvas#boardCanvas {
            background-color: #0a2f3c;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: block;
            width: 100%;
            height: auto;
            cursor: pointer;
        }

        /* info lateral */
        .info-panel {
            background: #0f2f3bdd;
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 18px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
            min-width: 130px;
        }

        .next-box {
            background: #05212b;
            border-radius: 24px;
            padding: 12px;
            text-align: center;
        }

        .next-box p {
            margin: 0 0 8px 0;
            color: #ffe3aa;
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 1px 1px 0 #001e2b;
        }

        canvas#nextCanvas {
            background-color: #083e4e;
            border-radius: 16px;
            display: block;
            width: 100px;
            height: 100px;
        }

        .score-box {
            background: #011c26;
            padding: 10px 20px;
            border-radius: 60px;
            text-align: center;
            width: 100%;
        }

        .score-box div {
            color: #f9e0a0;
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .score-box span {
            font-size: 2rem;
            font-weight: 800;
            color: #ffd966;
        }

        /* controles táctiles */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
            background: #03212db3;
            border-radius: 60px;
            padding: 12px 18px;
        }

        .ctrl-btn {
            background: #f5b642;
            border: none;
            font-size: 1.9rem;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 56px;
            color: #1e3b45;
            box-shadow: 0 5px 0 #a4511b;
            transition: 0.03s linear;
            cursor: pointer;
            touch-action: manipulation;
            min-width: 70px;
            text-align: center;
            font-family: monospace;
        }

        .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #a4511b;
        }

        .restart-btn {
            background: #4e95b0;
            color: white;
            box-shadow: 0 5px 0 #2d5a6e;
            font-size: 1.3rem;
            padding: 10px 18px;
        }

        @media (max-width: 580px) {
            .ctrl-btn { font-size: 1.4rem; padding: 8px 14px; min-width: 55px; }
            .score-box span { font-size: 1.6rem; }
            .info-panel { padding: 12px; min-width: 110px; }
        }

        @media (max-width: 480px) {
            .container { gap: 8px; }
            .ctrl-btn { padding: 6px 12px; font-size: 1.2rem; }
        }

        footer {
            text-align: center;
            color: #9bb7c4;
            margin-top: 12px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="container">
        <!-- tablero principal -->
        <div class="board-section">
            <canvas id="boardCanvas" width="300" height="600"></canvas>
        </div>

        <!-- panel derecho -->
        <div class="info-panel">
            <div class="next-box">
                <p>🐟 SIGUIENTE</p>
                <canvas id="nextCanvas" width="120" height="120"></canvas>
            </div>
            <div class="score-box">
                <div>🎣 PUNTOS</div>
                <span id="scoreValue">0</span>
            </div>
            <div class="score-box">
                <div>🏆 LÍNEAS</div>
                <span id="linesValue">0</span>
            </div>
        </div>
    </div>

    <!-- controles táctiles -->
    <div class="controls">
        <button class="ctrl-btn" id="moveLeft">◀ IZQ</button>
        <button class="ctrl-btn" id="moveRight">DER ▶</button>
        <button class="ctrl-btn" id="rotateBtn">🔄 ROTAR</button>
        <button class="ctrl-btn" id="hardDropBtn">⬇️ CAÍDA</button>
        <button class="ctrl-btn restart-btn" id="restartBtn">🔁 REINICIAR</button>
    </div>
    <footer>🐚 Toca los botones | Apila focas marinas 🦭</footer>
</div>

<script>
    (function(){
        // ---------- CONFIGURACIÓN TETRIS ----------
        const COLS = 10;
        const ROWS = 20;
        const CELL_SIZE = 30;     // 30px -> board 300x600
        const NEXT_SIZE = 24;     // tamaño de celda en el canvas de preview (120/5 ≈24 pero ajustamos)

        // Obtener canvas
        const boardCanvas = document.getElementById('boardCanvas');
        const ctx = boardCanvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        
        // elementos UI
        const scoreSpan = document.getElementById('scoreValue');
        const linesSpan = document.getElementById('linesValue');
        
        // Dimensiones reales
        boardCanvas.width = COLS * CELL_SIZE;
        boardCanvas.height = ROWS * CELL_SIZE;
        // next canvas preview: 5x5 máximo (pieza max 4x4) pero usaremos escala
        nextCanvas.width = 120;
        nextCanvas.height = 120;
        
        // ---------- PIEZAS TEMÁTICAS: FORMAS CLÁSICAS CON NOMBRES DE FOCA ----------
        const TETROMINOS = [
            {   // I
                shape: [[1,1,1,1]],
                color: '#68c5e0',
                name: 'Foca Larga'
            },
            {   // O
                shape: [[1,1],[1,1]],
                color: '#f9d56e',
                name: 'Foca Redonda'
            },
            {   // T
                shape: [[0,1,0],[1,1,1]],
                color: '#c084fc',
                name: 'Foca T'
            },
            {   // S
                shape: [[0,1,1],[1,1,0]],
                color: '#6fcf97',
                name: 'Foca S'
            },
            {   // Z
                shape: [[1,1,0],[0,1,1]],
                color: '#e67e5a',
                name: 'Foca Z'
            },
            {   // L
                shape: [[1,0,0],[1,1,1]],
                color: '#f5ad6b',
                name: 'Foca L'
            },
            {   // J
                shape: [[0,0,1],[1,1,1]],
                color: '#5dade2',
                name: 'Foca J'
            }
        ];
        
        // obtener pieza aleatoria (copia profunda)
        function getRandomPiece() {
            const idx = Math.floor(Math.random() * TETROMINOS.length);
            const original = TETROMINOS[idx];
            const shapeCopy = original.shape.map(row => [...row]);
            return {
                shape: shapeCopy,
                color: original.color,
                name: original.name
            };
        }
        
        // estado del juego
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0)); // 0 = vacío, almacenamos objeto color?
        let activePiece = null;      // pieza actual { shape, color, x, y }
        let nextPiece = null;
        let score = 0;
        let linesCleared = 0;
        let gameActive = true;
        let fallInterval = null;      // intervalo de caída automática
        const BASE_INTERVAL_MS = 450; // velocidad clásica
        
        // ---------- funciones auxiliares ----------
        function updateUI() {
            scoreSpan.innerText = score;
            linesSpan.innerText = linesCleared;
        }
        
        // Dibujar una pieza en el canvas (útil para board y preview)
        function drawPiece(ctx, piece, offsetX, offsetY, cellW, cellH, isBoard = false, boardGridColors = null) {
            const shape = piece.shape;
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[0].length; c++) {
                    if (shape[r][c]) {
                        const x = offsetX + c * cellW;
                        const y = offsetY + r * cellH;
                        ctx.fillStyle = piece.color;
                        ctx.fillRect(x, y, cellW-1, cellH-1);
                        // dibujar detalles de focas (caritas)
                        ctx.fillStyle = '#fff9e0';
                        ctx.font = `${cellW * 0.55}px "Segoe UI", monospace`;
                        ctx.fillText("🦭", x + cellW*0.2, y + cellH*0.75);
                    }
                }
            }
        }
        
        // dibujar tablero completo
        function drawBoard() {
            ctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
            // cuadrícula fondo + piezas fijas
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const cell = board[row][col];
                    const x = col * CELL_SIZE;
                    const y = row * CELL_SIZE;
                    if (cell !== 0) {
                        ctx.fillStyle = cell.color;
                        ctx.fillRect(x, y, CELL_SIZE-1, CELL_SIZE-1);
                        ctx.fillStyle = '#fff9e0';
                        ctx.font = `${CELL_SIZE * 0.55}px monospace`;
                        ctx.fillText("🦭", x + CELL_SIZE*0.2, y + CELL_SIZE*0.75);
                    } else {
                        ctx.fillStyle = '#174f5e';
                        ctx.fillRect(x, y, CELL_SIZE-1, CELL_SIZE-1);
                        ctx.fillStyle = '#2e6d80';
                        ctx.fillRect(x+2, y+2, CELL_SIZE-5, CELL_SIZE-5);
                    }
                }
            }
            // dibujar pieza activa
            if (activePiece && gameActive) {
                const offX = activePiece.x * CELL_SIZE;
                const offY = activePiece.y * CELL_SIZE;
                for (let r = 0; r < activePiece.shape.length; r++) {
                    for (let c = 0; c < activePiece.shape[0].length; c++) {
                        if (activePiece.shape[r][c]) {
                            const x = offX + c * CELL_SIZE;
                            const y = offY + r * CELL_SIZE;
                            ctx.fillStyle = activePiece.color;
                            ctx.fillRect(x, y, CELL_SIZE-1, CELL_SIZE-1);
                            ctx.fillStyle = '#fff2cf';
                            ctx.font = `${CELL_SIZE * 0.55}px monospace`;
                            ctx.fillText("🦭", x + CELL_SIZE*0.2, y + CELL_SIZE*0.75);
                        }
                    }
                }
            }
        }
        
        function drawNext() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            nextCtx.fillStyle = '#083e4e';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (nextPiece) {
                const shape = nextPiece.shape;
                const blockW = nextCanvas.width / 5;  // 24px aprox
                const blockH = nextCanvas.height / 5;
                const shapeRows = shape.length;
                const shapeCols = shape[0].length;
                const startX = (nextCanvas.width - (shapeCols * blockW)) / 2;
                const startY = (nextCanvas.height - (shapeRows * blockH)) / 2;
                for (let r=0; r<shapeRows; r++) {
                    for (let c=0; c<shapeCols; c++) {
                        if (shape[r][c]) {
                            nextCtx.fillStyle = nextPiece.color;
                            nextCtx.fillRect(startX + c*blockW, startY + r*blockH, blockW-2, blockH-2);
                            nextCtx.fillStyle = '#ffe3aa';
                            nextCtx.font = `${blockW * 0.6}px monospace`;
                            nextCtx.fillText("🦭", startX + c*blockW + blockW*0.2, startY + r*blockH + blockH*0.75);
                        }
                    }
                }
            }
        }
        
        // validar colisión
        function collide(piece, newX, newY) {
            for (let r = 0; r < piece.shape.length; r++) {
                for (let c = 0; c < piece.shape[0].length; c++) {
                    if (piece.shape[r][c]) {
                        const boardX = newX + c;
                        const boardY = newY + r;
                        if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) return true;
                        if (boardY >= 0 && board[boardY][boardX] !== 0) return true;
                    }
                }
            }
            return false;
        }
        
        // fijar pieza activa al tablero
        function mergePiece() {
            for (let r = 0; r < activePiece.shape.length; r++) {
                for (let c = 0; c < activePiece.shape[0].length; c++) {
                    if (activePiece.shape[r][c]) {
                        const boardX = activePiece.x + c;
                        const boardY = activePiece.y + r;
                        if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            board[boardY][boardX] = { color: activePiece.color, name: activePiece.name };
                        }
                    }
                }
            }
            // eliminar líneas completas
            clearLines();
            // generar nueva pieza
            spawnNewPieceFromNext();
            drawBoard();
            drawNext();
            // verificar game over
            if (checkGameOver()) {
                gameOver();
            }
        }
        
        function clearLines() {
            let rowsCleared = 0;
            for (let row = ROWS-1; row >= 0; ) {
                let full = true;
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col] === 0) { full = false; break; }
                }
                if (full) {
                    // eliminar fila
                    for (let r = row; r > 0; r--) {
                        board[r] = [...board[r-1]];
                    }
                    board[0] = Array(COLS).fill(0);
                    rowsCleared++;
                    // no incrementamos row, porque la fila superior baja
                } else {
                    row--;
                }
            }
            if (rowsCleared > 0) {
                // puntuación clásica
                const points = [0, 40, 100, 300, 1200];
                const addScore = points[Math.min(rowsCleared,4)];
                score += addScore;
                linesCleared += rowsCleared;
                updateUI();
            }
        }
        
        function spawnNewPieceFromNext() {
            if (!nextPiece) {
                nextPiece = getRandomPiece();
            }
            // la pieza activa se convierte en la siguiente
            activePiece = {
                shape: nextPiece.shape.map(row => [...row]),
                color: nextPiece.color,
                name: nextPiece.name,
                x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
                y: 0
            };
            // generar nueva siguiente pieza
            nextPiece = getRandomPiece();
            
            // colisión inicial (game over)
            if (collide(activePiece, activePiece.x, activePiece.y)) {
                gameActive = false;
                if (fallInterval) clearInterval(fallInterval);
                fallInterval = null;
                gameOver();
            }
            drawBoard();
            drawNext();
        }
        
        function checkGameOver() {
            // despues de generar, si la pieza colisiona al spawn ya se maneja, pero adicionalmente al inicio del merge
            return !gameActive;
        }
        
        function gameOver() {
            if (!gameActive) return;
            gameActive = false;
            if (fallInterval) {
                clearInterval(fallInterval);
                fallInterval = null;
            }
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = '#01121acc';
            ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#ffeaac';
            ctx.font = 'bold 20px monospace';
            ctx.fillText('GAME OVER', boardCanvas.width/2-70, boardCanvas.height/2);
        }
        
        // movimientos
        function moveLeft() {
            if (!gameActive || !activePiece) return;
            if (!collide(activePiece, activePiece.x - 1, activePiece.y)) {
                activePiece.x--;
                drawBoard();
            }
        }
        
        function moveRight() {
            if (!gameActive || !activePiece) return;
            if (!collide(activePiece, activePiece.x + 1, activePiece.y)) {
                activePiece.x++;
                drawBoard();
            }
        }
        
        function rotatePiece() {
            if (!gameActive || !activePiece) return;
            // rotar matriz
            const oldShape = activePiece.shape;
            const rotated = oldShape[0].map((_, idx) => oldShape.map(row => row[idx]).reverse());
            const oldX = activePiece.x;
            const oldY = activePiece.y;
            const testPiece = {
                ...activePiece,
                shape: rotated
            };
            if (!collide(testPiece, oldX, oldY)) {
                activePiece.shape = rotated;
            } else {
                // intentar corrimiento lateral (wall kick simple)
                for (let offset of [-1, 1, -2, 2]) {
                    if (!collide(testPiece, oldX + offset, oldY)) {
                        activePiece.shape = rotated;
                        activePiece.x += offset;
                        break;
                    }
                }
            }
            drawBoard();
        }
        
        function hardDrop() {
            if (!gameActive || !activePiece) return;
            while (!collide(activePiece, activePiece.x, activePiece.y + 1)) {
                activePiece.y++;
            }
            mergePiece();  // fijar y generar siguiente
            drawBoard();
            drawNext();
        }
        
        // caída automática por intervalo
        function stepFall() {
            if (!gameActive) return;
            if (!collide(activePiece, activePiece.x, activePiece.y + 1)) {
                activePiece.y++;
                drawBoard();
            } else {
                mergePiece();
                drawBoard();
                drawNext();
            }
        }
        
        function startGameLoop() {
            if (fallInterval) clearInterval(fallInterval);
            fallInterval = setInterval(() => {
                stepFall();
            }, BASE_INTERVAL_MS);
        }
        
        // reinicio completo
        function restartGame() {
            // reiniciar tablero
            for (let i = 0; i < ROWS; i++) {
                for (let j = 0; j < COLS; j++) {
                    board[i][j] = 0;
                }
            }
            score = 0;
            linesCleared = 0;
            updateUI();
            gameActive = true;
            // generar piezas iniciales
            nextPiece = getRandomPiece();
            // crear pieza activa
            activePiece = {
                shape: nextPiece.shape.map(row => [...row]),
                color: nextPiece.color,
                name: nextPiece.name,
                x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
                y: 0
            };
            // nueva siguiente
            nextPiece = getRandomPiece();
            // asegurar que no hay colisión
            if (collide(activePiece, activePiece.x, activePiece.y)) {
                // forzar reinicio limpio (caso raro)
                board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
                activePiece.y = 0;
                activePiece.x = Math.floor((COLS - activePiece.shape[0].length) / 2);
            }
            if (fallInterval) clearInterval(fallInterval);
            startGameLoop();
            drawBoard();
            drawNext();
        }
        
        // ---------- INICIALIZACIÓN Y EVENTOS TÁCTILES ----------
        function init() {
            restartGame(); // esto dibuja y setea todo
            // eventos de botones
            document.getElementById('moveLeft').addEventListener('click', (e) => { e.preventDefault(); moveLeft(); });
            document.getElementById('moveRight').addEventListener('click', (e) => { e.preventDefault(); moveRight(); });
            document.getElementById('rotateBtn').addEventListener('click', (e) => { e.preventDefault(); rotatePiece(); });
            document.getElementById('hardDropBtn').addEventListener('click', (e) => { e.preventDefault(); hardDrop(); });
            document.getElementById('restartBtn').addEventListener('click', (e) => { e.preventDefault(); restartGame(); });
            
            // también permitir deslizamiento táctil opcional? pero mantenemos botones grandes para móvil.
            // Prevenir contexto de canvas
            boardCanvas.addEventListener('contextmenu', (e) => e.preventDefault());
            nextCanvas.addEventListener('contextmenu', (e) => e.preventDefault());
        }
        
        // Llamar init
        init();
    })();
</script>
</body>
</html>
